name: Sync docs config mirror

on:
  push:
    branches:
    - main
    paths:
    - default.json
    - recommended.json
    - presets/**
    - .github/workflows/sync-docs.yml
    - .github/workflows/sync-docs.sh
  pull_request:
    paths:
    - default.json
    - recommended.json
    - presets/**
    - .github/workflows/sync-docs.yml
    - .github/workflows/sync-docs.sh
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Generate docs mirror
      shell: bash
      run: |
        bash .github/workflows/sync-docs.sh

    - name: Verify docs mirror is clean
      shell: bash
      run: |
        set -euo pipefail
        if grep -R "local>ni/python-renovate-config" docs; then
          echo "Found unresolved local preset references in docs/" >&2
          exit 1
        fi

        if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]] && ! git diff --quiet -- docs; then
          echo "docs/ is out of sync with the source configs; regenerate it (via this workflow) and commit the updated docs/ output." >&2
          git --no-pager diff -- docs >&2
          exit 1
        fi

  publish-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate-docs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Generate docs mirror
      shell: bash
      run: |
        bash .github/workflows/sync-docs.sh

    - name: Commit docs mirror changes
      shell: bash
      run: |
        set -euo pipefail
        if git diff --quiet -- docs; then
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add docs
        git commit -m "Update generated docs config mirror"
        git push
